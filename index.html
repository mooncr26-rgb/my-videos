<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Moon Studio - ვიდეო პლატფორმა</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        .video-card {
            background: #1a1a1a;
            border-radius: 12px;
            overflow: hidden;
            transition: transform 0.2s;
        }
        .video-card:hover {
            transform: translateY(-5px);
        }
    </style>
</head>
<body class="bg-[#121212] text-white font-sans min-h-screen">

    <nav class="bg-[#181818] p-4 flex justify-between items-center border-b border-gray-800">
        <div class="text-xl font-bold tracking-wider">MOON <span class="text-blue-500">STUDIO</span></div>
        <button id="adminBtn" onclick="handleAdminClick()" class="bg-gray-700 hover:bg-gray-600 px-4 py-2 rounded-lg text-sm transition">პანელი</button>
    </nav>

    <main class="container mx-auto px-4 py-8">
        
        <section id="adminPanel" class="hidden max-w-xl mx-auto bg-[#181818] p-6 rounded-xl border border-gray-800 mb-12 shadow-2xl">
            <h2 class="text-lg font-semibold mb-4 text-gray-300 border-b border-gray-700 pb-2">🎥 ვიდეოს დამატება პლატფორმაზე</h2>
            
            <div class="space-y-4">
                <div>
                    <label class="block text-sm text-gray-400 mb-2">ვიდეოს სათაური</label>
                    <input type="text" id="videoTitle" class="w-full bg-[#121212] border border-gray-700 rounded-lg p-3 text-white focus:outline-none focus:border-blue-500" placeholder="შეიყვანეთ სათაური...">
                </div>
                <div>
                    <label class="block text-sm text-gray-400 mb-2">აირჩიე ვიდეო ფაილი (MP4, MOV და ა.შ.)</label>
                    <input type="file" id="videoFile" class="w-full bg-[#121212] border border-gray-700 rounded-lg p-2 text-gray-300 file:mr-4 file:py-2 file:px-4 file:rounded-lg file:border-0 file:text-sm file:font-semibold file:bg-blue-600 file:text-white hover:file:bg-blue-700 cursor-pointer">
                </div>
                <button onclick="addVideo()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-medium py-3 rounded-lg transition duration-200">ატვირთვა პლატფორმაზე</button>
                <p id="uploadStatus" class="text-center text-sm text-gray-400 hidden">იტვირთება... გთხოვთ მოიცადოთ.</p>
            </div>
        </section>

        <section>
            <h1 class="text-2xl font-bold mb-6">უახლესი ვიდეოები</h1>
            <div id="videoGrid" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6">
                </div>
        </section>

    </main>

    <script>
        // შენი რეალური Supabase მონაცემები (დაკავშირებულია პირადად შენს ბაზასთან)
        const SUPABASE_URL = "https://wuyvebiuqtjklqlbmrmes.supabase.co";
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Ind1eWViaXVxdGprbHFsYm1ybWVzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI3OTc5NTcsImV4cCI6MjA5ODM3Mzk1N30.37Z-swkBlmEVfmaJsO3BsCXk2LdHtj1yXWN1oJrYIRw";

        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        let isAdmin = false;

        // საიტის ჩატვირთვისას გამოვიტანოთ ვიდეოები
        document.addEventListener("DOMContentLoaded", loadVideos);

        // ადმინ პანელში შესვლა პაროლით (777)
        function handleAdminClick() {
            if (!isAdmin) {
                const password = prompt("შეიყვანეთ ადმინისტრატორის პაროლი:");
                if (password === "777") {
                    isAdmin = true;
                    document.getElementById("adminPanel").classList.remove("hidden");
                    document.getElementById("adminBtn").innerText = "პანელი (აქტიური)";
                    document.getElementById("adminBtn").classList.replace("bg-gray-700", "bg-green-600");
                } else {
                    alert("პაროლი არასწორია!");
                }
            } else {
                isAdmin = false;
                document.getElementById("adminPanel").classList.add("hidden");
                document.getElementById("adminBtn").innerText = "პანელი";
                document.getElementById("adminBtn").classList.replace("bg-green-600", "bg-gray-700");
            }
        }

        // ვიდეოს ატვირთვა Storage-ში და მონაცემის ბაზაში შენახვა
        async function addVideo() {
            const titleInput = document.getElementById("videoTitle");
            const fileInput = document.getElementById("videoFile");
            const statusText = document.getElementById("uploadStatus");

            const title = titleInput.value.trim();
            const file = fileInput.files[0];

            if (!title || !file) {
                alert("გთხოვთ შეიყვანოთ სათაური და აირჩიოთ ფაილი!");
                return;
            }

            statusText.classList.remove("hidden");

            // ვქმნით უნიკალურ სახელს ფაილისთვის
            const fileExt = file.name.split('.').pop();
            const fileName = `${Date.now()}.${fileExt}`;

            // 1. ფაილის ატვირთვა Storage-ში (videos ბაკეტში)
            const { error: uploadError } = await supabase.storage
                .from('videos')
                .upload(fileName, file);

            if (uploadError) {
                statusText.classList.add("hidden");
                alert("ფაილის საცავში ატვირთვის შეცდომა: " + uploadError.message);
                return;
            }

            // 2. ვიღებთ ატვირთული ფაილის საჯარო ლინკს
            const { data: publicUrlData } = supabase.storage
                .from('videos')
                .getPublicUrl(fileName);

            const videoUrl = publicUrlData.publicUrl;

            // 3. ვინახავთ ინფორმაციას (სათაურს და ლინკს) Database ცხრილში - 'videos'
            const { error: dbError } = await supabase
                .from('videos') // ცხრილის სახელწოდება ბაზაში
                .insert([{ title: title, video_url: videoUrl }]);

            statusText.classList.add("hidden");

            if (dbError) {
                alert("მონაცემთა ბაზაში შენახვის შეცდომა: " + dbError.message);
            } else {
                alert("ვიდეო წარმატებით აიტვირთა!");
                titleInput.value = "";
                fileInput.value = "";
                loadVideos(); // ვანახლებთ სიას
            }
        }

        // საიტზე ვიდეოების წამოღება და გამოტანა
        async function loadVideos() {
            const videoGrid = document.getElementById("videoGrid");
            
            // ამოვიღოთ ბაზიდან ყველა ჩანაწერი
            const { data: videos, error } = await supabase
                .from('videos')
                .select('*')
                .order('created_at', { ascending: false });

            if (error) {
                console.error("ვიდეოების ჩატვირთვის ერორი:", error.message);
                return;
            }

            videoGrid.innerHTML = "";

            if (!videos || videos.length === 0) {
                videoGrid.innerHTML = `<p class="text-gray-500 col-span-full">ვიდეოები ვერ მოიძებნა. ატვირთეთ პირველი ვიდეო!</p>`;
                return;
            }

            // თითოეული ვიდეოსთვის ვქმნით ლამაზ ბლოკს (Card)
            videos.forEach(video => {
                const card = `
                    <div class="video-card border border-gray-800 flex flex-col">
                        <div class="relative pb-[56.25%] bg-black h-0 overflow-hidden">
                            <video src="${video.video_url}" controls class="absolute top-0 left-0 w-full h-full object-cover"></video>
                        </div>
                        <div class="p-4 flex flex-col flex-grow">
                            <h3 class="font-semibold text-base truncate mb-2" title="${video.title}">${video.title}</h3>
                            <span class="text-xs text-gray-500 mt-auto pt-2">${new Date(video.created_at).toLocaleDateString()}</span>
                        </div>
                    </div>
                `;
                videoGrid.innerHTML += card;
            });
        }
    </script>
</body>
</html>
