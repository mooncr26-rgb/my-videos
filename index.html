<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Moon Studio - Videos</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/plyr@3.7.8/dist/plyr.css" />
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --plyr-color-main: #2563eb; }
        body {
            background-image: url('https://image.api.playstation.com/vulcan/img/rnd/202011/0402/2D4vYyWpT3R4pE4G8fS8t6Lp.png');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-repeat: no-repeat;
        }
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(10, 10, 10, 0.7);
            z-index: -1;
        }
    </style>
</head>
<body class="text-zinc-100 min-h-screen font-sans antialiased relative">

    <header class="border-b border-zinc-800 bg-zinc-900/60 backdrop-blur sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 h-16 flex items-center justify-between">
            <h1 class="text-xl font-bold tracking-wider text-white">MOON <span class="text-blue-500">STUDIO</span></h1>
            <button onclick="toggleAdmin()" class="text-xs bg-zinc-800 hover:bg-zinc-700 text-zinc-300 px-3 py-1.5 rounded-lg border border-zinc-700 transition">
                პანელი
            </button>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-4 py-8 relative z-10">
        <div id="admin-panel" class="hidden mb-10 p-6 bg-zinc-900/90 border border-zinc-800 rounded-2xl max-w-xl mx-auto shadow-2xl backdrop-blur-sm">
            <h2 class="text-lg font-bold mb-4 text-white flex items-center gap-2">
                <span class="w-2 h-2 rounded-full bg-blue-500 animate-pulse"></span>
                კომპიუტერიდან ვიდეოს ატვირთვა
            </h2>
            <div class="space-y-4">
                <div>
                    <label class="block text-xs text-zinc-400 mb-1">ვიდეოს სათაური</label>
                    <input type="text" id="v-title" placeholder="შეიყვანე ვიდეოს სათაური..." class="w-full bg-zinc-950 border border-zinc-800 rounded-lg px-3 py-2 text-sm text-white focus:outline-none focus:border-blue-500 transition">
                </div>
                <div>
                    <label class="block text-xs text-zinc-400 mb-1">აირჩიე ვიდეო ფაილი (MP4, MOV და ა.შ.)</label>
                    <input type="file" id="v-file" accept="video/*" class="w-full bg-zinc-950 border border-zinc-800 rounded-lg px-3 py-2 text-sm text-zinc-400 file:mr-4 file:py-1 file:px-3 file:rounded-md file:border-0 file:text-xs file:font-semibold file:bg-zinc-800 file:text-zinc-200 hover:file:bg-zinc-700 file:cursor-pointer cursor-pointer">
                </div>
                <button id="upload-btn" onclick="addVideo()" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-medium text-sm py-2.5 rounded-lg transition shadow-lg shadow-blue-600/20">
                    ატვირთვა პლატფორმაზე
                </button>
            </div>
        </div>

        <div id="video-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/plyr@3.7.8/dist/plyr.polyfilled.min.js"></script>
    
    <script>
        const SUPABASE_URL = "https://rbblqmmrztoikugtfxqc.supabase.co";
        const SUPABASE_KEY = "sb_publishable_LdTQuJuchnF9vzu1SQKuFA_Jwy_3xTq";
        
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        let isAdmin = false;

        async function fetchVideos() {
            const grid = document.getElementById('video-grid');
            grid.innerHTML = '<div class="col-span-full text-center py-12 text-zinc-500 text-sm">კავშირი სერვერთან...</div>';

            let { data: videos, error } = await _supabase
                .from('videos')
                .select('*')
                .order('id', { ascending: false });

            if (error) {
                grid.innerHTML = '<div class="col-span-full text-center py-12 text-red-500 text-sm">შეცდომა ბაზიდან წაკითხვისას!</div>';
                return;
            }

            if (!videos || videos.length === 0) {
                grid.innerHTML = '<div class="col-span-full text-center py-12 text-zinc-600 text-sm">ვიდეოები არ არის. გახსენი პანელი და ატვირთე პირველი ვიდეო.</div>';
                return;
            }

            grid.innerHTML = '';
            videos.forEach(video => {
                const card = document.createElement('div');
                card.className = "bg-zinc-900/80 rounded-xl overflow-hidden border border-zinc-800 shadow-xl flex flex-col justify-between transition-all duration-300 hover:border-zinc-700 backdrop-blur-sm";
                
                let playerHTML = `<video class="js-player" playsinline controls><source src="${video.url}" type="video/mp4" /></video>`;

                card.innerHTML = `
                    <div class="aspect-video w-full bg-black flex items-center justify-center">${playerHTML}</div>
                    <div class="p-4 flex justify-between items-start gap-4 bg-zinc-900/50">
                        <h3 class="font-medium text-sm text-zinc-200 line-clamp-2 leading-relaxed">${video.title}</h3>
                        ${isAdmin ? `<button onclick="deleteVideo(${video.id}, '${video.url}')" class="text-xs font-medium bg-red-950/40 hover:bg-red-900 text-red-400 px-2.5 py-1 rounded-md border border-red-900/50 transition shrink-0">წაშლა</button>` : ''}
                    </div>
                `;
                grid.appendChild(card);
            });

            Plyr.setup('.js-player', { 
                controls: ['play-large', 'play', 'progress', 'current-time', 'mute', 'volume', 'fullscreen'], 
                ratio: '16:9' 
            });
        }

        async function addVideo() {
            const title = document.getElementById('v-title').value.trim();
            const fileInput = document.getElementById('v-file');
            const file = fileInput.files[0];
            const btn = document.getElementById('upload-btn');

            if(!title || !file) {
                alert('გთხოვთ შეიყვანოთ სათაური და აირჩიოთ ვიდეო ფაილი!');
                return;
            }

            btn.disabled = true;
            btn.innerText = 'ვიდეო იტვირთება სერვერზე... არ დაკეტო გვერდი!';
            btn.classList.add('bg-zinc-700', 'cursor-not-allowed');

            const fileExt = file.name.split('.').pop();
            const fileName = `${Date.now()}.${fileExt}`;

            // საცავის სახელი დაბრუნდა პატარა ასოებზე ('videos')
            const { data: storageData, error: storageError } = await _supabase
                .storage
                .from('videos')
                .upload(fileName, file);

            if (storageError) {
                alert('ფაილის საცავში ატვირთვის შეცდომა: ' + storageError.message);
                resetUploadButton();
                return;
            }

            // საცავის სახელი დაბრუნდა პატარა ასოებზე ('videos')
            const { data: urlData } = _supabase
                .storage
                .from('videos')
                .getPublicUrl(fileName);

            const publicUrl = urlData.publicUrl;

            const { error: dbError } = await _supabase
                .from('videos')
                .insert([{ title, url: publicUrl }]);
            
            if (dbError) {
                alert('მონაცემთა ბაზაში ჩაწერის შეცდომა: ' + dbError.message);
            } else {
                document.getElementById('v-title').value = '';
                fileInput.value = '';
                fetchVideos();
            }

            resetUploadButton();
        }

        function resetUploadButton() {
            const btn = document.getElementById('upload-btn');
            btn.disabled = false;
            btn.innerText = 'ატვირთვა პლატფორმაზე';
            btn.classList.remove('bg-zinc-700', 'cursor-not-allowed');
        }

        async function deleteVideo(id, fileUrl) {
            if(!confirm('დარწმუნებული ხარ, რომ გინდა ამ ვიდეოს სამუდამოდ წაშლა?')) return;
            
            const fileName = fileUrl.split('/').pop();

            // საცავის სახელი დაბრუნდა პატარა ასოებზე ('videos')
            await _supabase.storage.from('videos').remove([fileName]);

            const { error } = await _supabase.from('videos').delete().eq('id', id);
            
            if (error) alert('ვერ წაიშალა ბაზიდან: ' + error.message);
            else fetchVideos();
        }

        function toggleAdmin() {
            if (!isAdmin) {
                let pass = prompt("შეიყვანე ადმინისტრატორის პაროლი:");
                if (pass === "777") { 
                    isAdmin = true;
                    document.getElementById('admin-panel').classList.remove('hidden');
                    fetchVideos();
                } else if (pass !== null) {
                    alert("არასწორი პაროლია!");
                }
            } else {
                isAdmin = false;
                document.getElementById('admin-panel').classList.add('hidden');
                fetchVideos();
            }
        }

        fetchVideos();
    </script>
</body>
</html>
