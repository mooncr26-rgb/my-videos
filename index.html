<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Moon Studio - Videos</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/plyr@3.7.8/dist/plyr.css" />
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --plyr-color-main: #2563eb; } /* ფლეიერის ლურჯი აქცენტი */
    </style>
</head>
<body class="bg-zinc-950 text-zinc-100 min-h-screen font-sans antialiased">

    <header class="border-b border-zinc-800 bg-zinc-900/50 backdrop-blur sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 h-16 flex items-center justify-between">
            <h1 class="text-xl font-bold tracking-wider text-white">MOON <span class="text-blue-500">STUDIO</span></h1>
            <button onclick="toggleAdmin()" class="text-xs bg-zinc-800 hover:bg-zinc-700 text-zinc-300 px-3 py-1.5 rounded-lg border border-zinc-700 transition">
                პანელი
            </button>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-4 py-8">
        
        <div id="admin-panel" class="hidden mb-10 p-6 bg-zinc-900 border border-zinc-800 rounded-2xl max-w-xl mx-auto shadow-2xl">
            <h2 class="text-lg font-bold mb-4 text-white flex items-center gap-2">
                <span class="w-2 h-2 rounded-full bg-blue-500 animate-pulse"></span>
                ახალი ვიდეოს დამატება
            </h2>
            <div class="space-y-4">
                <div>
                    <label class="block text-xs text-zinc-400 mb-1">ვიდეოს სათაური</label>
                    <input type="text" id="v-title" placeholder="მაგ: ახალი ედიტი" class="w-full bg-zinc-950 border border-zinc-800 rounded-lg px-3 py-2 text-sm text-white focus:outline-none focus:border-blue-500 transition">
                </div>
                <div>
                    <label class="block text-xs text-zinc-400 mb-1">ვიდეოს ლინკი (პირდაპირი MP4 ან YouTube)</label>
                    <input type="text" id="v-url" placeholder="https://..." class="w-full bg-zinc-950 border border-zinc-800 rounded-lg px-3 py-2 text-sm text-white focus:outline-none focus:border-blue-500 transition">
                </div>
                <button onclick="addVideo()" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-medium text-sm py-2.5 rounded-lg transition shadow-lg shadow-blue-600/20">
                    ატვირთვა პლატფორმაზე
                </button>
            </div>
        </div>

        <div id="video-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/plyr@3.7.8/dist/plyr.polyfilled.min.js"></script>
    
    <script>
        // შენი Supabase მონაცემები უკვე ჩასმულია აქ
        const SUPABASE_URL = "https://rbblqmmrztoikugtfxqc.supabase.co";
        const SUPABASE_KEY = "sb_publishable_LdTQuJuchnF9vzu1SQKuFA_Jwy_3xTq";
        
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        let isAdmin = false;

        // ბაზიდან ვიდეოების წამოღება და ეკრანზე გამოტანა
        async function fetchVideos() {
            const grid = document.getElementById('video-grid');
            grid.innerHTML = '<div class="col-span-full text-center py-12 text-zinc-500 text-sm">კავშირი სერვერთან...</div>';

            let { data: videos, error } = await _supabase
                .from('videos')
                .select('*')
                .order('id', { ascending: false });

            if (error) {
                grid.innerHTML = '<div class="col-span-full text-center py-12 text-red-500 text-sm">შეცდომა ბაზიდან წაკითხვისას!</div>';
                return;
            }

            if (!videos || videos.length === 0) {
                grid.innerHTML = '<div class="col-span-full text-center py-12 text-zinc-600 text-sm">ვიდეოები არ არის. გახსენი პანელი და დაამატე.</div>';
                return;
            }

            grid.innerHTML = '';
            videos.forEach(video => {
                const isYoutube = video.url.includes('youtube.com') || video.url.includes('youtu.be');
                const card = document.createElement('div');
                card.className = "bg-zinc-900 rounded-xl overflow-hidden border border-zinc-800 shadow-xl flex flex-col justify-between transition-all duration-300 hover:border-zinc-700";
                
                let playerHTML = isYoutube 
                    ? `<div class="plyr__video-embed js-player"><iframe src="${video.url}" allowfullscreen allowtransparency allow="autoplay"></iframe></div>`
                    : `<video class="js-player" playsinline controls><source src="${video.url}" type="video/mp4" /></video>`;

                card.innerHTML = `
                    <div class="aspect-video w-full bg-black flex items-center justify-center">${playerHTML}</div>
                    <div class="p-4 flex justify-between items-start gap-4 bg-zinc-900/50">
                        <h3 class="font-medium text-sm text-zinc-200 line-clamp-2 leading-relaxed">${video.title}</h3>
                        ${isAdmin ? `<button onclick="deleteVideo(${video.id})" class="text-xs font-medium bg-red-950/40 hover:bg-red-900 text-red-400 px-2.5 py-1 rounded-md border border-red-900/50 transition shrink-0">წაშლა</button>` : ''}
                    </div>
                `;
                grid.appendChild(card);
            });

            Plyr.setup('.js-player', { 
                controls: ['play-large', 'play', 'progress', 'current-time', 'mute', 'volume', 'fullscreen'], 
                ratio: '16:9' 
            });
        }

        // ახალი ვიდეოს ჩაწერა ბაზაში
        async function addVideo() {
            const title = document.getElementById('v-title').value.trim();
            const url = document.getElementById('v-url').value.trim();

            if(!title || !url) {
                alert('შეავსე ორივე ველი!');
                return;
            }

            const { error } = await _supabase.from('videos').insert([{ title, url }]);
            
            if (error) {
                alert('ბაზაში ჩაწერის შეცდომა: ' + error.message);
            } else {
                document.getElementById('v-title').value = '';
                document.getElementById('v-url').value = '';
                fetchVideos();
            }
        }

        // ვიდეოს წაშლა ბაზიდან
        async function deleteVideo(id) {
            if(!confirm('დარწმუნებული ხარ, რომ გინდა ამ ვიდეოს წაშლა?')) return;
            
            const { error } = await _supabase.from('videos').delete().eq('id', id);
            if (error) alert('ვერ წაიშალა: ' + error.message);
            else fetchVideos();
        }

        // ადმინ პანელის გამოჩენა პაროლით
        function toggleAdmin() {
            if (!isAdmin) {
                let pass = prompt("შეიყვანე ადმინისტრატორის პაროლი:");
                if (pass === "777") { 
                    isAdmin = true;
                    document.getElementById('admin-panel').classList.remove('hidden');
                    fetchVideos();
                } else if (pass !== null) {
                    alert("არასწორი პაროლია!");
                }
            } else {
                isAdmin = false;
                document.getElementById('admin-panel').classList.add('hidden');
                fetchVideos();
            }
        }

        // პირველადი ჩატვირთვა
        fetchVideos();
    </script>
</body>
</html>
